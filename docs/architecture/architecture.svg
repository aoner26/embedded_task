<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="980" fill="#ffffff"/>

  <text x="660" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#111111">Temperature Monitor - Layered Architecture</text>
  <text x="660" y="56" text-anchor="middle" font-size="13" fill="#555555">Same design for the C and the C++ (OOP) implementation - only how each layer is expressed differs</text>

  <!-- Lane headers -->
  <text x="330" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#8a4b00">Start-up sequence - runs ONCE, before the timer is armed</text>
  <text x="990" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#0a5c8a">Real-time task - runs every 100 &#181;s, from the timer ISR</text>

  <!-- ================= Application layer ================= -->
  <text x="30" y="128" font-size="13" font-weight="bold" fill="#333333">APPLICATION</text>

  <rect x="90" y="100" width="480" height="60" rx="8" fill="#dbe9f6" stroke="#4472a8"/>
  <text x="330" y="124" text-anchor="middle" font-size="13" font-weight="bold">app_temp_monitor_init()</text>
  <text x="330" y="142" text-anchor="middle" font-size="12">TemperatureMonitorApplication::initialize()</text>

  <rect x="750" y="100" width="480" height="60" rx="8" fill="#dbe9f6" stroke="#4472a8"/>
  <text x="990" y="120" text-anchor="middle" font-size="13" font-weight="bold">TIM2_IRQHandler()</text>
  <text x="990" y="136" text-anchor="middle" font-size="12">app_temp_monitor_on_sample_tick() /</text>
  <text x="990" y="150" text-anchor="middle" font-size="12">Application::onRealTimeTick()</text>

  <line x1="570" y1="130" x2="750" y2="130" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="660" y="122" text-anchor="middle" font-size="11" fill="#666666">arms &amp; starts</text>

  <!-- ================= Service layer ================= -->
  <text x="30" y="220" font-size="13" font-weight="bold" fill="#333333">SERVICE</text>

  <rect x="90" y="190" width="480" height="60" rx="8" fill="#e0f2e9" stroke="#3f8a5f"/>
  <text x="330" y="214" text-anchor="middle" font-size="13" font-weight="bold">device_config_service / DeviceConfigManager</text>
  <text x="330" y="232" text-anchor="middle" font-size="12">reads HW revision + serial number - exactly once</text>

  <rect x="750" y="190" width="230" height="80" rx="8" fill="#e0f2e9" stroke="#3f8a5f"/>
  <text x="865" y="212" text-anchor="middle" font-size="13" font-weight="bold">temperature_service /</text>
  <text x="865" y="228" text-anchor="middle" font-size="13" font-weight="bold">TemperatureMonitor</text>
  <text x="865" y="246" text-anchor="middle" font-size="11.5">scale (Rev-A/B) + &#177;1&#176;C</text>
  <text x="865" y="260" text-anchor="middle" font-size="11.5">hysteresis state machine</text>

  <rect x="1000" y="190" width="230" height="80" rx="8" fill="#e0f2e9" stroke="#3f8a5f"/>
  <text x="1115" y="212" text-anchor="middle" font-size="13" font-weight="bold">led_indicator_service /</text>
  <text x="1115" y="228" text-anchor="middle" font-size="13" font-weight="bold">LedIndicator</text>
  <text x="1115" y="248" text-anchor="middle" font-size="11.5">zone -&gt; single active LED</text>

  <!-- scaler injection arrow: config service selects scaler, feeds into temperature service -->
  <path d="M330,250 C330,300 700,300 850,270" fill="none" stroke="#8a4b00" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="560" y="296" text-anchor="middle" font-size="11.5" fill="#8a4b00">injects ITemperatureScaler (RevA/RevB) chosen from HW revision - one-time, before start()</text>

  <!-- ================= Driver layer ================= -->
  <text x="30" y="358" font-size="13" font-weight="bold" fill="#333333">DRIVER / HAL</text>

  <rect x="90" y="330" width="230" height="55" rx="8" fill="#fdf2d0" stroke="#a97e15"/>
  <text x="205" y="352" text-anchor="middle" font-size="12.5" font-weight="bold">i2c_driver / McuI2cBus</text>
  <text x="205" y="368" text-anchor="middle" font-size="11">polling I2C master</text>

  <rect x="340" y="330" width="230" height="55" rx="8" fill="#fdf2d0" stroke="#a97e15"/>
  <text x="455" y="352" text-anchor="middle" font-size="12.5" font-weight="bold">eeprom_driver / Eeprom24LC</text>
  <text x="455" y="368" text-anchor="middle" font-size="11">byte-addressable EEPROM device</text>

  <rect x="750" y="330" width="150" height="55" rx="8" fill="#fdf2d0" stroke="#a97e15"/>
  <text x="825" y="352" text-anchor="middle" font-size="12.5" font-weight="bold">adc_driver /</text>
  <text x="825" y="368" text-anchor="middle" font-size="12.5" font-weight="bold">McuAdcChannel</text>

  <rect x="920" y="330" width="150" height="55" rx="8" fill="#fdf2d0" stroke="#a97e15"/>
  <text x="995" y="352" text-anchor="middle" font-size="12.5" font-weight="bold">gpio_driver /</text>
  <text x="995" y="368" text-anchor="middle" font-size="12.5" font-weight="bold">McuGpioOutput</text>

  <rect x="1090" y="330" width="140" height="55" rx="8" fill="#fdf2d0" stroke="#a97e15"/>
  <text x="1160" y="352" text-anchor="middle" font-size="12.5" font-weight="bold">timer_driver /</text>
  <text x="1160" y="368" text-anchor="middle" font-size="12.5" font-weight="bold">McuTimer</text>

  <!-- ================= Hardware / mocked platform layer ================= -->
  <text x="30" y="480" font-size="13" font-weight="bold" fill="#333333">HARDWARE</text>
  <text x="30" y="497" font-size="11" fill="#777777">(mocked for the</text>
  <text x="30" y="511" font-size="11" fill="#777777">PC demo build)</text>

  <rect x="215" y="450" width="230" height="55" rx="8" fill="#ececec" stroke="#888888"/>
  <text x="330" y="472" text-anchor="middle" font-size="12.5" font-weight="bold">Configuration EEPROM</text>
  <text x="330" y="488" text-anchor="middle" font-size="11">HW revision + serial no. (I2C, addr 0x50)</text>

  <rect x="750" y="450" width="150" height="55" rx="8" fill="#ececec" stroke="#888888"/>
  <text x="825" y="472" text-anchor="middle" font-size="12.5" font-weight="bold">Temp. sensor</text>
  <text x="825" y="488" text-anchor="middle" font-size="11">(ADC channel)</text>

  <rect x="920" y="450" width="150" height="55" rx="8" fill="#ececec" stroke="#888888"/>
  <text x="995" y="472" text-anchor="middle" font-size="12.5" font-weight="bold">G / Y / R LEDs</text>
  <text x="995" y="488" text-anchor="middle" font-size="11">(GPIO pins)</text>

  <rect x="1090" y="450" width="140" height="55" rx="8" fill="#ececec" stroke="#888888"/>
  <text x="1160" y="472" text-anchor="middle" font-size="12.5" font-weight="bold">Periodic timer</text>
  <text x="1160" y="488" text-anchor="middle" font-size="11">100 &#181;s update IRQ</text>

  <!-- vertical connectors -->
  <line x1="330" y1="160" x2="330" y2="190" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="205" y1="250" x2="205" y2="330" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="330" y1="385" x2="330" y2="450" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="320" y1="220" x2="340" y2="357" stroke="#333333" stroke-width="1.4" marker-end="url(#arrow)"/>

  <line x1="990" y1="160" x2="990" y2="190" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="865" y1="270" x2="825" y2="330" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1115" y1="270" x2="995" y2="330" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="825" y1="385" x2="825" y2="450" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="995" y1="385" x2="995" y2="450" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1160" y1="385" x2="1160" y2="450" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1160" y1="330" x2="990" y2="160" stroke="#333333" stroke-width="1.6" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <text x="1120" y="300" text-anchor="middle" font-size="11" fill="#666666">IRQ fires</text>

  <!-- Notes box -->
  <rect x="90" y="545" width="1140" height="130" rx="8" fill="#fff7e6" stroke="#c98a12"/>
  <text x="110" y="568" font-size="13" font-weight="bold" fill="#8a4b00">Why the EEPROM read is kept out of the real-time task</text>
  <text x="110" y="590" font-size="12">An I2C transaction is a blocking, multi-byte, multi-microsecond bus operation with timing that is not tightly bounded -</text>
  <text x="110" y="608" font-size="12">running it inside a 100 &#181;s periodic ISR would make the sampling jitter budget impossible to hold. The hardware revision and</text>
  <text x="110" y="626" font-size="12">serial number also never change once the board is powered on, so there is nothing to gain by re-reading them anyway.</text>
  <text x="110" y="644" font-size="12">Both values are therefore read exactly once, during app_temp_monitor_init() / Application::initialize(), which completes</text>
  <text x="110" y="662" font-size="12">and caches the sensor scale factor before app_temp_monitor_start() / Application::start() ever arms the timer.</text>

  <!-- Notes box 2 - hysteresis -->
  <rect x="90" y="695" width="1140" height="150" rx="8" fill="#eef6ff" stroke="#3a72ad"/>
  <text x="110" y="718" font-size="13" font-weight="bold" fill="#0a5c8a">LED thresholds and &#177;1&#176;C hysteresis (anti-flicker)</text>
  <text x="110" y="740" font-size="12">Green (OK)     : &lt; 85.0 &#176;C            enters Warning at &#8805; 85.0 &#176;C,  returns to OK only below 84.0 &#176;C</text>
  <text x="110" y="758" font-size="12">Yellow (Warning): 85.0 .. 105.0 &#176;C     enters Critical(high) at &#8805; 105.0 &#176;C,  returns to Warning only below 104.0 &#176;C</text>
  <text x="110" y="776" font-size="12">Red (Critical)  : &#8805; 105.0 &#176;C  or  &lt; 5.0 &#176;C   on the low side, enters Critical at &lt; 5.0 &#176;C, returns to OK only at &#8805; 6.0 &#176;C</text>
  <text x="110" y="798" font-size="12">Every boundary therefore has a 1 &#176;C dead-band on its return path, so a reading sitting right on a threshold cannot make</text>
  <text x="110" y="816" font-size="12">the corresponding LED switch back and forth on sensor/ADC noise alone.</text>

  <!-- Legend -->
  <rect x="90" y="865" width="18" height="14" fill="#dbe9f6" stroke="#4472a8"/>
  <text x="115" y="877" font-size="12">Application layer</text>
  <rect x="250" y="865" width="18" height="14" fill="#e0f2e9" stroke="#3f8a5f"/>
  <text x="275" y="877" font-size="12">Service layer</text>
  <rect x="390" y="865" width="18" height="14" fill="#fdf2d0" stroke="#a97e15"/>
  <text x="415" y="877" font-size="12">Driver / hardware abstraction layer</text>
  <rect x="640" y="865" width="18" height="14" fill="#ececec" stroke="#888888"/>
  <text x="665" y="877" font-size="12">Hardware (mocked for the PC demo)</text>

  <text x="90" y="915" font-size="11.5" fill="#777777">Full source: c_implementation/ (C) and cpp_implementation/ (C++ / OOP: abstraction via interfaces, polymorphism via</text>
  <text x="90" y="932" font-size="11.5" fill="#777777">ITemperatureScaler, dependency injection/inversion in every service and application constructor).</text>
</svg>
